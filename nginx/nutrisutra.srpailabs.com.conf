# nutrisutra.srpailabs.com — AI Nutrition Analysis PWA
# Let's Encrypt SSL (auto-renew via certbot)

server {
    listen 80;
    listen [::]:80;
    server_name nutrisutra.srpailabs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nutrisutra.srpailabs.com;

    ssl_certificate     /etc/letsencrypt/live/nutrisutra.srpailabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nutrisutra.srpailabs.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"  always;
    add_header X-Content-Type-Options  "nosniff"     always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    # Serve frontend static files
    root /opt/nutrisutra/dist;
    index index.html;

    # Backend API proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:8030;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # Backend health endpoint
    location = /health {
        proxy_pass         http://127.0.0.1:8030;
        proxy_http_version 1.1;
        proxy_set_header   Host $http_host;
    }

    # React SPA — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;

        # No caching for HTML — always serve fresh
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
