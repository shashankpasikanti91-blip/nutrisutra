<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3320;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a5c3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6a4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#40c077;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ee7a0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#40c077;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#40c077;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6ee7a0;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#6ee7a0;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="16"/>

  <!-- Decorative orbs -->
  <circle cx="150" cy="100" r="200" fill="url(#orb1)"/>
  <circle cx="1050" cy="300" r="250" fill="url(#orb2)"/>
  <circle cx="900" cy="80" r="120" fill="url(#orb1)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Decorative dots -->
  <g opacity="0.08" fill="#6ee7a0">
    <circle cx="100" cy="50" r="3"/>
    <circle cx="250" cy="350" r="2"/>
    <circle cx="400" cy="70" r="2.5"/>
    <circle cx="550" cy="360" r="2"/>
    <circle cx="700" cy="40" r="3"/>
    <circle cx="850" cy="370" r="2"/>
    <circle cx="1000" cy="60" r="2.5"/>
    <circle cx="1150" cy="340" r="2"/>
  </g>

  <!-- Leaf icon (simplified logo shape) -->
  <g transform="translate(460, 60) scale(0.5)" opacity="0.9">
    <!-- Bowl -->
    <path d="M80 160 C80 200, 120 230, 170 230 C220 230, 260 200, 260 160 Z" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.6"/>
    <!-- Leaf -->
    <path d="M170 50 C130 80, 100 120, 120 160 C140 120, 160 90, 200 70 C210 60, 190 45, 170 50Z" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.6"/>
  </g>

  <!-- Main Title -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">
    NutriSutra
  </text>

  <!-- Tagline -->
  <text x="600" y="220" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#6ee7a0" font-weight="500" letter-spacing="1">
    THE HONEST CALORIE COUNTER FOR REAL FOOD
  </text>

  <!-- Divider line -->
  <rect x="480" y="240" width="240" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">
    <!-- Pill 1 -->
    <rect x="270" y="265" width="140" height="32" rx="16" fill="#40c077" opacity="0.15"/>
    <text x="340" y="286" text-anchor="middle" fill="#6ee7a0">📸 Snap &amp; Scan</text>

    <!-- Pill 2 -->
    <rect x="430" y="265" width="160" height="32" rx="16" fill="#40c077" opacity="0.15"/>
    <text x="510" y="286" text-anchor="middle" fill="#6ee7a0">🎯 Goal Verdicts</text>

    <!-- Pill 3 -->
    <rect x="610" y="265" width="180" height="32" rx="16" fill="#40c077" opacity="0.15"/>
    <text x="700" y="286" text-anchor="middle" fill="#6ee7a0">🍛 Indian Food First</text>

    <!-- Pill 4 -->
    <rect x="810" y="265" width="140" height="32" rx="16" fill="#40c077" opacity="0.15"/>
    <text x="880" y="286" text-anchor="middle" fill="#6ee7a0">🔒 Privacy First</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', monospace" font-size="14" fill="#ffffff" opacity="0.4">
    Same food + same portion + same style = same result. Always.
  </text>

  <!-- Version badge -->
  <g transform="translate(530, 355)">
    <rect width="140" height="24" rx="12" fill="#ffffff" opacity="0.08"/>
    <text x="70" y="16" text-anchor="middle" font-family="system-ui, monospace" font-size="11" fill="#ffffff" opacity="0.5">React · TypeScript · PWA</text>
  </g>
</svg>