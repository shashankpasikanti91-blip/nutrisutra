<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faf9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f7f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f" />
      <stop offset="100%" style="stop-color:#40c077" />
    </linearGradient>
    <linearGradient id="greenBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d6a4f" />
      <stop offset="100%" style="stop-color:#52b788" />
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#fbbf24" />
    </linearGradient>
    <linearGradient id="cardShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0" />
    </linearGradient>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#1a3a2a" flood-opacity="0.25"/>
    </filter>
    <filter id="cardDrop">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <clipPath id="screen1Clip">
      <rect x="62" y="85" width="226" height="430" rx="4"/>
    </clipPath>
    <clipPath id="screen2Clip">
      <rect x="437" y="85" width="226" height="430" rx="4"/>
    </clipPath>
    <clipPath id="screen3Clip">
      <rect x="812" y="85" width="226" height="430" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" fill="url(#bg)" rx="16"/>

  <!-- ==================== PHONE 1: Snap & Analyze ==================== -->
  <g filter="url(#phoneShadow)" transform="translate(0, 60)">
    <!-- Phone frame -->
    <rect x="50" y="20" width="250" height="510" rx="28" fill="#1a1a1a"/>
    <rect x="56" y="26" width="238" height="498" rx="24" fill="#2a2a2a"/>
    <rect x="62" y="42" width="226" height="476" rx="20" fill="url(#screen)"/>

    <!-- Status bar -->
    <rect x="62" y="42" width="226" height="28" fill="#ffffff"/>
    <text x="80" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#666">9:41</text>
    <g transform="translate(240, 52)" fill="#666">
      <rect x="0" y="-4" width="16" height="8" rx="2" fill="none" stroke="#666" stroke-width="1"/>
      <rect x="2" y="-2" width="10" height="4" rx="1" fill="#40c077"/>
      <rect x="16" y="-2" width="2" height="4" rx="1" fill="#666"/>
    </g>

    <!-- Notch -->
    <rect x="140" y="20" width="70" height="22" rx="11" fill="#1a1a1a"/>

    <!-- Screen content: Analyze page -->
    <g clip-path="url(#screen1Clip)">
      <!-- Header -->
      <text x="78" y="105" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">Scan your meal</text>
      <text x="78" y="120" font-family="system-ui, sans-serif" font-size="9" fill="#888">Snap a photo or type what you ate</text>

      <!-- Goal pills -->
      <rect x="200" y="93" width="40" height="16" rx="8" fill="#10b981"/>
      <text x="220" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#fff" font-weight="600">🔥 Lose</text>
      <rect x="244" y="93" width="40" height="16" rx="8" fill="#e5e7eb"/>
      <text x="264" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#888" font-weight="600">💪 Gain</text>

      <!-- Mode toggle -->
      <rect x="72" y="132" width="206" height="32" rx="14" fill="#f3f4f6"/>
      <rect x="74" y="134" width="100" height="28" rx="12" fill="#ffffff" filter="url(#cardDrop)"/>
      <text x="124" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2d6a4f" font-weight="600">📸 Snap</text>
      <text x="226" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#aaa" font-weight="600">✏️ Type</text>

      <!-- Camera viewfinder area -->
      <rect x="72" y="174" width="206" height="155" rx="16" fill="#111"/>
      <!-- Viewfinder corners -->
      <path d="M90 194 L90 184 L100 184" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
      <path d="M260 194 L260 184 L250 184" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
      <path d="M90 309 L90 319 L100 319" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
      <path d="M260 309 L260 319 L250 319" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
      <!-- Food emoji in center (representing food being scanned) -->
      <text x="175" y="260" text-anchor="middle" font-size="40">🍛</text>
      <!-- Hint -->
      <rect x="130" y="186" width="90" height="18" rx="9" fill="#000" opacity="0.4"/>
      <text x="175" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#fff" opacity="0.9">Point at your meal</text>
      <!-- Bottom camera controls -->
      <circle cx="125" cy="310" r="14" fill="#fff" opacity="0.2"/>
      <text x="125" y="314" text-anchor="middle" font-size="10">🖼️</text>
      <circle cx="175" cy="310" r="22" fill="none" stroke="#fff" stroke-width="3" opacity="0.9"/>
      <circle cx="175" cy="310" r="17" fill="#fff"/>
      <circle cx="225" cy="310" r="14" fill="#fff" opacity="0.2"/>
      <text x="225" y="314" text-anchor="middle" font-size="10">🔄</text>

      <!-- Analyze button -->
      <rect x="72" y="340" width="206" height="38" rx="14" fill="url(#greenBtn)"/>
      <text x="175" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fff" font-weight="700">✨ Analyze this meal</text>

      <!-- Bottom nav bar -->
      <rect x="62" y="478" width="226" height="40" fill="#ffffff"/>
      <line x1="62" y1="478" x2="288" y2="478" stroke="#eee" stroke-width="1"/>
      <text x="105" y="498" text-anchor="middle" font-size="14">🏠</text>
      <text x="175" y="498" text-anchor="middle" font-size="14">📊</text>
      <text x="245" y="498" text-anchor="middle" font-size="14">💧</text>
    </g>

    <!-- Home indicator -->
    <rect x="135" y="508" width="80" height="4" rx="2" fill="#666"/>
  </g>

  <!-- Label -->
  <text x="175" y="620" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a3a2a">Snap &amp; Scan</text>
  <text x="175" y="638" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">AI-powered food detection</text>

  <!-- ==================== PHONE 2: Results & Verdict ==================== -->
  <g filter="url(#phoneShadow)" transform="translate(375, 40)">
    <!-- Phone frame (larger, hero phone) -->
    <rect x="50" y="20" width="250" height="510" rx="28" fill="#1a1a1a"/>
    <rect x="56" y="26" width="238" height="498" rx="24" fill="#2a2a2a"/>
    <rect x="62" y="42" width="226" height="476" rx="20" fill="url(#screen)"/>

    <!-- Status bar -->
    <rect x="62" y="42" width="226" height="28" fill="#ffffff"/>
    <text x="80" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#666">9:41</text>

    <!-- Notch -->
    <rect x="140" y="20" width="70" height="22" rx="11" fill="#1a1a1a"/>

    <!-- Screen: Analysis Results -->
    <g clip-path="url(#screen2Clip)">
      <!-- Calorie Card -->
      <rect x="72" y="90" width="206" height="120" rx="14" fill="#ffffff" filter="url(#cardDrop)"/>
      <text x="86" y="112" font-family="system-ui, sans-serif" font-size="10" fill="#888" font-weight="500">Total Calories</text>

      <!-- Big calorie number -->
      <text x="86" y="148" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#1a1a1a">342</text>
      <text x="156" y="148" font-family="system-ui, sans-serif" font-size="14" fill="#888">kcal</text>

      <!-- Calorie range -->
      <text x="86" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#aaa">Range: 315 – 370 kcal</text>

      <!-- Macro bars -->
      <g transform="translate(86, 175)">
        <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" fill="#666">Protein 14g</text>
        <rect x="70" y="1" width="110" height="8" rx="4" fill="#f0f0f0"/>
        <rect x="70" y="1" width="35" height="8" rx="4" fill="#3b82f6"/>

        <text x="0" y="22" font-family="system-ui, sans-serif" font-size="8" fill="#666">Carbs 52g</text>
        <rect x="70" y="15" width="110" height="8" rx="4" fill="#f0f0f0"/>
        <rect x="70" y="15" width="80" height="8" rx="4" fill="#f59e0b"/>

        <text x="0" y="36" font-family="system-ui, sans-serif" font-size="8" fill="#666">Fat 8g</text>
        <rect x="70" y="29" width="110" height="8" rx="4" fill="#f0f0f0"/>
        <rect x="70" y="29" width="22" height="8" rx="4" fill="#ef4444"/>
      </g>

      <!-- Decision Card - Green verdict -->
      <rect x="72" y="222" width="206" height="80" rx="14" fill="#ecfdf5" filter="url(#cardDrop)"/>
      <rect x="72" y="222" width="206" height="80" rx="14" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>

      <!-- Verdict emoji & text -->
      <text x="90" y="252" font-size="22">🟢</text>
      <text x="116" y="247" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Great for weight loss!</text>
      <text x="88" y="268" font-family="system-ui, sans-serif" font-size="9" fill="#047857">✓ Low calorie  ✓ High fiber  ✓ Steamed</text>
      <text x="88" y="282" font-family="system-ui, sans-serif" font-size="9" fill="#047857">✓ Good protein ratio</text>
      <!-- Tip -->
      <rect x="88" y="288" width="170" height="4" rx="2" fill="#10b981" opacity="0.15"/>

      <!-- Component Breakdown -->
      <rect x="72" y="314" width="206" height="100" rx="14" fill="#ffffff" filter="url(#cardDrop)"/>
      <text x="86" y="335" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">Breakdown</text>

      <!-- Items -->
      <g font-family="system-ui, sans-serif" font-size="9">
        <text x="88" y="355" fill="#333" font-weight="500">🫓 2× Idli</text>
        <text x="232" y="355" text-anchor="end" fill="#666">156 kcal</text>
        <rect x="88" y="360" width="176" height="1" fill="#f0f0f0"/>

        <text x="88" y="375" fill="#333" font-weight="500">🥘 Sambar</text>
        <text x="232" y="375" text-anchor="end" fill="#666">120 kcal</text>
        <rect x="88" y="380" width="176" height="1" fill="#f0f0f0"/>

        <text x="88" y="395" fill="#333" font-weight="500">🥣 Chutney</text>
        <text x="232" y="395" text-anchor="end" fill="#666">66 kcal</text>
      </g>

      <!-- Add to tracker button -->
      <rect x="72" y="424" width="206" height="34" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
      <text x="175" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#2d6a4f" font-weight="600">＋ Add to Breakfast</text>

      <!-- Confidence badge -->
      <rect x="72" y="468" width="80" height="20" rx="10" fill="#f0fdf4"/>
      <text x="112" y="482" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#16a34a" font-weight="500">✓ High confidence</text>
    </g>

    <!-- Home indicator -->
    <rect x="135" y="508" width="80" height="4" rx="2" fill="#666"/>
  </g>

  <!-- Label -->
  <text x="550" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a3a2a">Smart Verdicts</text>
  <text x="550" y="618" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">Goal-based eat / skip decisions</text>

  <!-- ==================== PHONE 3: Daily Tracker ==================== -->
  <g filter="url(#phoneShadow)" transform="translate(750, 60)">
    <!-- Phone frame -->
    <rect x="50" y="20" width="250" height="510" rx="28" fill="#1a1a1a"/>
    <rect x="56" y="26" width="238" height="498" rx="24" fill="#2a2a2a"/>
    <rect x="62" y="42" width="226" height="476" rx="20" fill="url(#screen)"/>

    <!-- Status bar -->
    <rect x="62" y="42" width="226" height="28" fill="#ffffff"/>
    <text x="80" y="60" font-family="system-ui, sans-serif" font-size="10" fill="#666">9:41</text>

    <!-- Notch -->
    <rect x="140" y="20" width="70" height="22" rx="11" fill="#1a1a1a"/>

    <!-- Screen: Daily Tracker -->
    <g clip-path="url(#screen3Clip)">
      <!-- Header -->
      <text x="78" y="105" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1a1a1a">Daily Tracker</text>
      <text x="78" y="120" font-family="system-ui, sans-serif" font-size="9" fill="#888">Today, April 3</text>

      <!-- Calorie progress ring (simplified) -->
      <g transform="translate(175, 175)">
        <circle cx="0" cy="0" r="45" fill="none" stroke="#f0f0f0" stroke-width="8"/>
        <circle cx="0" cy="0" r="45" fill="none" stroke="url(#green)" stroke-width="8"
                stroke-dasharray="198" stroke-dashoffset="60" stroke-linecap="round"
                transform="rotate(-90)"/>
        <text x="0" y="-6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1a1a1a">1,340</text>
        <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#888">of 1,800 kcal</text>
      </g>

      <!-- Macro mini cards -->
      <g transform="translate(72, 235)">
        <rect x="0" y="0" width="64" height="42" rx="10" fill="#eff6ff" filter="url(#cardDrop)"/>
        <text x="32" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#3b82f6" font-weight="600">Protein</text>
        <text x="32" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#1e40af">68g</text>

        <rect x="72" y="0" width="64" height="42" rx="10" fill="#fefce8" filter="url(#cardDrop)"/>
        <text x="104" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#d97706" font-weight="600">Carbs</text>
        <text x="104" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#92400e">165g</text>

        <rect x="144" y="0" width="64" height="42" rx="10" fill="#fef2f2" filter="url(#cardDrop)"/>
        <text x="176" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ef4444" font-weight="600">Fat</text>
        <text x="176" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#991b1b">42g</text>
      </g>

      <!-- Meal slots -->
      <g transform="translate(72, 292)">
        <!-- Breakfast -->
        <rect x="0" y="0" width="206" height="44" rx="12" fill="#ffffff" filter="url(#cardDrop)"/>
        <text x="16" y="20" font-size="16">🌅</text>
        <text x="40" y="18" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#333">Breakfast</text>
        <text x="40" y="32" font-family="system-ui, sans-serif" font-size="8" fill="#888">2 Idli, Sambar, Chutney</text>
        <text x="190" y="24" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2d6a4f">342</text>

        <!-- Lunch -->
        <rect x="0" y="52" width="206" height="44" rx="12" fill="#ffffff" filter="url(#cardDrop)"/>
        <text x="16" y="72" font-size="16">☀️</text>
        <text x="40" y="70" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#333">Lunch</text>
        <text x="40" y="84" font-family="system-ui, sans-serif" font-size="8" fill="#888">Rice, Dal, Chicken Curry</text>
        <text x="190" y="76" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2d6a4f">580</text>

        <!-- Snacks -->
        <rect x="0" y="104" width="206" height="44" rx="12" fill="#ffffff" filter="url(#cardDrop)"/>
        <text x="16" y="124" font-size="16">🍪</text>
        <text x="40" y="122" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#333">Snacks</text>
        <text x="40" y="136" font-family="system-ui, sans-serif" font-size="8" fill="#888">Coffee, 8 Almonds</text>
        <text x="190" y="128" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2d6a4f">418</text>

        <!-- Dinner (empty) -->
        <rect x="0" y="156" width="206" height="44" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
        <text x="16" y="176" font-size="16">🌙</text>
        <text x="40" y="174" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#aaa">Dinner</text>
        <text x="40" y="188" font-family="system-ui, sans-serif" font-size="8" fill="#ccc">Tap + to add</text>
        <text x="190" y="180" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#ccc">+</text>
      </g>

      <!-- Water tracker mini -->
      <g transform="translate(72, 502)">
        <rect x="0" y="-6" width="206" height="20" rx="10" fill="#eff6ff"/>
        <text x="10" y="8" font-size="10">💧</text>
        <text x="28" y="8" font-family="system-ui, sans-serif" font-size="9" fill="#1d4ed8" font-weight="500">Water: 5/8 glasses</text>
        <rect x="130" y="-2" width="70" height="12" rx="6" fill="#e0f2fe"/>
        <rect x="130" y="-2" width="44" height="12" rx="6" fill="#3b82f6"/>
      </g>
    </g>

    <!-- Home indicator -->
    <rect x="135" y="508" width="80" height="4" rx="2" fill="#666"/>
  </g>

  <!-- Label -->
  <text x="925" y="620" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a3a2a">Daily Tracker</text>
  <text x="925" y="638" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">Meals, macros &amp; water at a glance</text>
</svg>